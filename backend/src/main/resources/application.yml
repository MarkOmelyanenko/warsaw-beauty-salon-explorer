server:
  port: 8080

spring:
  application:
    name: salon-explorer-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/salons_db}
    username: ${SPRING_DATASOURCE_USERNAME:salons_user}
    password: ${SPRING_DATASOURCE_PASSWORD:salons_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    org.hibernate.SQL: debug
