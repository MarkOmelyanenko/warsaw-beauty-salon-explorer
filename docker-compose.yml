services:
  postgres:
    image: postgres:16-alpine
    container_name: beauty-salon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: salons_db
      POSTGRES_USER: salons_user
      POSTGRES_PASSWORD: salons_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salons_user -d salons_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
